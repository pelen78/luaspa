<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&amp;display=swap');
    </style>
    <!-- Arc path for "Beauty Spa" text along top of circle -->
    <path id="topArc" d="M 48,200 A 152,152 0 0,1 352,200"/>

    <!-- Gentle sketch filter for the circles -->
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- ── Outer ring (two slightly offset circles for sketchy feel) ── -->
  <circle cx="200" cy="202" r="151" fill="none" stroke="#8A84C2" stroke-width="2.2" opacity="0.70" filter="url(#sketch)"/>
  <circle cx="200" cy="200" r="155" fill="none" stroke="#8A84C2" stroke-width="1.2" opacity="0.35" filter="url(#sketch)"/>

  <!-- ── "Beauty Spa" curved text ── -->
  <text font-family="Georgia, 'Times New Roman', serif"
        font-size="17"
        fill="#ABA7D4"
        letter-spacing="5"
        font-weight="400">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">Beauty Spa</textPath>
  </text>

  <!-- ── "Lua" main script lettering ── -->
  <!-- Shadow / depth layer -->
  <text x="204" y="262"
        font-family="'Great Vibes', 'Dancing Script', cursive"
        font-size="148"
        fill="#7ABCAA"
        text-anchor="middle"
        opacity="0.35">Lua</text>
  <!-- Main layer -->
  <text x="202" y="258"
        font-family="'Great Vibes', 'Dancing Script', cursive"
        font-size="148"
        fill="#8ECAB8"
        text-anchor="middle">Lua</text>

  <!-- ── Decorative swoosh lines at bottom ── -->
  <path d="M 90,318 C 130,308 170,312 200,313 C 232,314 268,310 312,304"
        fill="none" stroke="#8A84C2" stroke-width="2.2" stroke-linecap="round" opacity="0.60"/>
  <path d="M 105,330 C 142,322 172,325 200,326 C 230,327 262,323 298,317"
        fill="none" stroke="#8A84C2" stroke-width="1.4" stroke-linecap="round" opacity="0.38"/>

  <!-- ── Small "gs" mark ── -->
  <text x="308" y="292"
        font-family="Georgia, serif"
        font-size="15"
        fill="#8ECAB8"
        opacity="0.75">gs</text>

  <!-- ── Accent swoosh marks lower-left (matches original) ── -->
  <path d="M 88,298 C 100,294 115,296 125,295"
        fill="none" stroke="#8A84C2" stroke-width="2" stroke-linecap="round" opacity="0.50"/>
  <path d="M 82,308 C 96,304 112,306 124,305"
        fill="none" stroke="#8A84C2" stroke-width="1.3" stroke-linecap="round" opacity="0.35"/>
</svg>
